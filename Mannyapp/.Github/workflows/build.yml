name: Build Menny APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Baixar codigo do repositorio
        uses: actions/checkout@v4

      - name: Configurar JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Dar permissao ao Gradle
        run: chmod +x gradlew

      - name: Gerar Gradle Wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O /tmp/gradle.zip
          unzip -q /tmp/gradle.zip -d /tmp/gradle
          /tmp/gradle/gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Compilar APK debug
        run: ./gradlew assembleDebug --no-daemon

      - name: Salvar APK gerado
        uses: actions/upload-artifact@v4
        with:
          name: Menny-APK
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7
